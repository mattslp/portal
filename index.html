<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Show Portal | Street Lamp</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <style>
    @import url('https://use.typekit.net/wby1ytb.css');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #020202;
      --surface:    #0e0e0e;
      --border:     rgba(245,240,232,0.1);
      --text:       #f5f0e8;
      --text-dim:   rgba(245,240,232,0.5);
      --text-faint: rgba(245,240,232,0.22);
      --gold:       #cc9900;
      --font:       'komet', 'Jost', sans-serif;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    body.light {
      --bg:         #fdfdfd;
      --surface:    #f0f0f0;
      --border:     rgba(2,2,2,0.12);
      --text:       #020202;
      --text-dim:   rgba(2,2,2,0.55);
      --text-faint: rgba(2,2,2,0.25);
    }

    body.light svg { filter: invert(1) brightness(0.15); }

    #main {
      flex: none;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 36px;
    }

    #logo {
      width: clamp(56px, 10vw, 72px);
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    #logo:hover { opacity: 1; }

    #header {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      line-height: 1;
    }

    #subtitle {
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    #login-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 360px;
    }

    .portal-input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(128,128,128,0.06);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      outline: none;
      transition: border-color 0.2s;
    }
    .portal-input::placeholder { color: var(--text-faint); }
    .portal-input:focus { border-color: rgba(128,128,128,0.4); }

    #login-btn {
      width: 100%;
      padding: 14px 24px;
      background: transparent;
      border: 1px solid var(--text-dim);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    #login-btn:hover:not(:disabled) { background: var(--text); color: var(--bg); }
    #login-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #login-error {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: #e05555;
      text-align: center;
      min-height: 1em;
    }

    #theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--font);
      font-size: 0.5rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 8px 12px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    #theme-toggle:hover { border-color: var(--text-dim); color: var(--text); }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    #main > * {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.5s ease forwards;
    }
    #main > *:nth-child(1) { animation-delay: 0.05s; }
    #main > *:nth-child(2) { animation-delay: 0.15s; }
    #main > *:nth-child(3) { animation-delay: 0.25s; }
  </style>
</head>
<body>

<button id="theme-toggle" onclick="toggleTheme()">Light</button>

<div id="main">
  <a href="https://streetlamp.org">
    <svg id="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1210" aria-label="Street Lamp">
      <path fill="#f5f0e8" opacity="0.35" d="M1315.82,76.28v956.28h-259.08c0,-242.15,93.17,-430.39,133.23,-500.08l42.65,-74.2l-73.14,-44.44c-34.42,-20.91,-102.39,-64.17,-170.86,-118.9c-79.61,-63.61,-133.93,-121.71,-161.49,-172.68l-24.86,-45.99h513.55Z"/>
      <path fill="#f5f0e8" opacity="0.35" d="M184.18,1032.56h259.08c0,-242.17,-93.17,-430.39,-133.23,-500.07l-42.65,-74.2l73.14,-44.44c34.42,-20.91,102.39,-64.17,170.85,-118.89c79.61,-63.62,133.94,-121.72,161.5,-172.69l24.86,-45.98H184.18v956.28Z"/>
      <path fill="#f5f0e8" d="M793.98,1032.56h175.08c0-265.62,104.07-472.75,144.89-543.77-36.94-22.44-108.08-67.8-180.07-125.33-89.22-71.3-150.67-138.03-183.89-199.48-33.22,61.45-94.66,128.18-183.89,199.48-71.99,57.54-143.13,102.89-180.07,125.33,40.82,71.02,144.89,278.15,144.89,543.77h175.22v87.69H184.18v87.69h1131.65v-87.69h-521.85v-87.69ZM793.98,487.29l228.52,51.56c-40.21,86.81-94.02,231.4-108.22,406.03h-120.3v-457.58ZM585.72,944.88c-14.2-174.63-68.01-319.22-108.22-406.03l228.78-51.62-.13,457.64h-120.43Z"/>
    </svg>
  </a>

  <div id="header">
    <h1>Show Portal</h1>
    <p id="subtitle">Street Lamp</p>
  </div>

  <form id="login-form" onsubmit="handleLogin(event)">
    <input class="portal-input" type="text" id="show-id" placeholder="Show ID (e.g. annie-2025)" autocomplete="off" autocapitalize="none" spellcheck="false" required>
    <input class="portal-input" type="password" id="password" placeholder="Password" autocomplete="current-password" required>
    <button type="submit" id="login-btn">Enter</button>
    <p id="login-error"></p>
  </form>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwR37bDfrzlr8gXWUHwr_Z36U5J6_XcFlIZKv7tIBBNg282AsmHL2BLG4zZpHpEY_v1eQ/exec';

async function handleLogin(e) {
  e.preventDefault();
  const showId = document.getElementById('show-id').value.trim().toLowerCase();
  const pw     = document.getElementById('password').value;
  const btn    = document.getElementById('login-btn');
  const err    = document.getElementById('login-error');

  btn.disabled = true;
  btn.textContent = 'Checking…';
  err.textContent = '';

  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: new URLSearchParams({ action: 'auth', show_id: showId, password: pw })
    });
    const data = await res.json();

    if (data.ok) {
      // Save password in session storage then redirect
      const key = data.role === 'admin' ? 'admin_pw_' : 'portal_pw_';
      sessionStorage.setItem(key + showId, pw);

      if (data.role === 'admin') {
        window.location.href = '/admin/?show=' + encodeURIComponent(showId);
      } else {
        window.location.href = '/show/?show=' + encodeURIComponent(showId);
      }
    } else {
      err.textContent = 'Incorrect show ID or password.';
      btn.disabled = false;
      btn.textContent = 'Enter';
    }
  } catch {
    err.textContent = 'Connection error — please try again.';
    btn.disabled = false;
    btn.textContent = 'Enter';
  }
}

function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  document.getElementById('theme-toggle').textContent = isLight ? 'Dark' : 'Light';
  localStorage.setItem('portal_theme', isLight ? 'light' : 'dark');
}

// Apply saved theme
(function() {
  if (localStorage.getItem('portal_theme') === 'light') {
    document.body.classList.add('light');
    document.getElementById('theme-toggle').textContent = 'Dark';
  }
})();
</script>
</body>
</html>
